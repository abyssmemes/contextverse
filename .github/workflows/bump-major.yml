name: bump-major

on:
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Bump major must be run from main (got ${GITHUB_REF})" >&2
            exit 1
          fi

  test:
    needs: [guard]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Test
        run: go test ./...
      - name: Build
        shell: bash
        run: |
          out=contextd
          [[ "${RUNNER_OS}" == "Windows" ]] && out=contextd.exe
          go build -o "$out" ./cmd/contextd

  integration:
    needs: [guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Integration (MinIO + Postgres)
        run: make test-integration

  release:
    name: release (major)
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Compute next major version
        id: ver
        run: |
          set -euo pipefail
          eval "$(bash scripts/ci/next-version.sh major | sed 's/^/export /')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${TAG}"

      - name: Create tag and release branch
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/create-release-refs.sh "$TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.tag }}

      - name: Publish Homebrew + Scoop
        env:
          PACKAGING_TOKEN: ${{ secrets.PACKAGING_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/publish-packages.sh "$TAG"
