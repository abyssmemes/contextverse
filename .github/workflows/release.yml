# Emergency / one-off GoReleaser for an existing tag.
# Normal releases go through ci.yml (main minor) or bump-major / release-branch.
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v0.2.0). Must already exist on the default branch history."
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
