name: release-branch

on:
  workflow_dispatch:
    inputs:
      action:
        description: "test = matrix+integration only; deploy = patch tag + GoReleaser + packages + new release branch"
        required: true
        type: choice
        options:
          - test
          - deploy

concurrency:
  group: release-branch-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require release/* branch
        run: |
          set -euo pipefail
          ref="${GITHUB_REF#refs/heads/}"
          if [[ ! "$ref" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Run this workflow from a release/X.Y.Z branch (got: $ref)" >&2
            exit 1
          fi
          echo "branch_ok=1"

  test:
    needs: [guard]
    if: inputs.action == 'test' || inputs.action == 'deploy'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Test
        run: go test ./...
      - name: Build
        shell: bash
        run: |
          out=contextd
          [[ "${RUNNER_OS}" == "Windows" ]] && out=contextd.exe
          go build -o "$out" ./cmd/contextd

  integration:
    needs: [guard]
    if: inputs.action == 'test' || inputs.action == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Integration (MinIO + Postgres)
        run: make test-integration

  deploy:
    name: deploy (patch)
    needs: [guard, test, integration]
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Compute next patch from branch base
        id: ver
        run: |
          set -euo pipefail
          ref="${GITHUB_REF#refs/heads/}"
          base="${ref#release/}"
          eval "$(NEXT_VERSION_LATEST="v${base}" bash scripts/ci/next-version.sh patch | sed 's/^/export /')"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          echo "Hotfix release: ${TAG} (from ${ref})"

      - name: Create tag and new release branch
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/create-release-refs.sh "$TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.tag }}

      - name: Publish Homebrew + Scoop
        env:
          PACKAGING_TOKEN: ${{ secrets.PACKAGING_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/publish-packages.sh "$TAG"
