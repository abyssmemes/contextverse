name: ci

# Product CI. Docs / Helm / README-only pushes do NOT trigger this workflow
# (see docs.yml). Auto minor release runs only when product code changed
# (not when this workflow file alone changed).
on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "cmd/**"
      - "internal/**"
      - "scripts/**"
      - ".goreleaser.yaml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/bump-major.yml"
      - ".github/workflows/release-branch.yml"
      - ".github/workflows/release.yml"
  push:
    branches:
      - main
      - "test/**"
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "cmd/**"
      - "internal/**"
      - "scripts/**"
      - ".goreleaser.yaml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/bump-major.yml"
      - ".github/workflows/release-branch.yml"
      - ".github/workflows/release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.filter.outputs.product }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            product:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'cmd/**'
              - 'internal/**'
              - 'scripts/**'
              - '.goreleaser.yaml'

  test:
    needs: [changes]
    if: needs.changes.outputs.product == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Test
        run: go test ./...
      - name: Build
        shell: bash
        run: |
          out=contextd
          [[ "${RUNNER_OS}" == "Windows" ]] && out=contextd.exe
          go build -o "$out" ./cmd/contextd
      - name: Shellcheck install.sh
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck scripts/install.sh
      - name: next-version self-test
        if: runner.os == 'Linux'
        run: bash scripts/ci/next-version_test.sh

  integration:
    needs: [changes]
    if: needs.changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Integration (MinIO + Postgres)
        run: make test-integration

  release:
    name: release (minor)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.product == 'true'
    needs: [changes, test, integration]
    runs-on: ubuntu-latest
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Compute next minor version
        id: ver
        run: |
          set -euo pipefail
          eval "$(bash scripts/ci/next-version.sh minor | sed 's/^/export /')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${TAG}"

      - name: Create tag and release branch
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/create-release-refs.sh "$TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.ver.outputs.tag }}

      - name: Publish Homebrew + Scoop
        env:
          PACKAGING_TOKEN: ${{ secrets.PACKAGING_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: bash scripts/ci/publish-packages.sh "$TAG"
