{{define "space.html"}}
<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="app">
  {{template "app-open" .}}
  <header class="page-head">
    <div>
      <h1>{{.Data.Name}}</h1>
      <p class="lede">head <span class="mono">{{.Data.Head}}</span> · template {{.Data.Template}}</p>
    </div>
    <a class="btn secondary" href="/ui/spaces">All spaces</a>
  </header>
  <div class="panel">
    <h2 class="section-title">Files</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Path</th><th>Version</th></tr></thead>
        <tbody>
        {{range .Data.Files}}
          <tr>
            <td><a href="/ui/spaces/{{$.Data.Name}}/files/{{.Path}}">{{.Path}}</a></td>
            <td class="mono muted">v{{.Version}}</td>
          </tr>
        {{else}}
          <tr><td colspan="2"><div class="empty"><strong>Empty space</strong>No files yet.</div></td></tr>
        {{end}}
        </tbody>
      </table>
    </div>
  </div>
  {{template "app-close" .}}
</body>
</html>
{{end}}
