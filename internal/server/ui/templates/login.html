{{define "login.html"}}
<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="auth">
  <div class="shell narrow">
    <div class="auth-top">{{template "theme-btn" .}}</div>
    <section class="hero">
      <span class="brand">ContextVerse</span>
      <h1>Sign in</h1>
      <p>Username + password, or paste an API token. Same auth as the CLI.</p>
    </section>
    {{if .FlashError}}<div class="flash err" role="alert">{{.FlashError}}</div>{{end}}
    <div class="panel">
      <form method="post" action="/ui/login">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" placeholder="admin" autofocus>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
        <div class="divider">or</div>
        <label for="token">API token</label>
        <input id="token" name="token" type="password" autocomplete="off" placeholder="cv-admin-…">
        <div class="actions">
          <button class="btn accent" type="submit">Enter dashboard</button>
        </div>
      </form>
    </div>
    <div class="footer">Theme <span class="kbd">d</span> flips canvas only · contextd {{.Version}}</div>
  </div>
</body>
</html>
{{end}}
