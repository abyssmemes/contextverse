{{define "policy_show.html"}}
<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="app">
  {{template "app-open" .}}
  <header class="page-head">
    <div>
      <h1>Policy <span class="mono">{{.Data.Name}}</span></h1>
      <p class="lede"><a href="/ui/policies">← all policies</a></p>
    </div>
  </header>
  <div class="panel">
    <pre class="file-pre" style="max-height:none;">{{.Data.Body}}</pre>
  </div>
  {{template "app-close" .}}
</body>
</html>
{{end}}
