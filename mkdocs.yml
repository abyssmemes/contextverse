site_name: ContextVerse
site_description: Portable, vendor-neutral context for AI — contextd docs
site_url: https://abyssmemes.github.io/contextverse/
repo_url: https://github.com/abyssmemes/contextverse
repo_name: abyssmemes/contextverse
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - CLI: cli.md
  - Server: server.md
  - Deploy (Docker & Helm): deploy.md
  - Auth & ACL: auth-acl.md
  - Packaging & releases: packaging.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abyssmemes/contextverse
