# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: contextd

before:
  hooks:
    - go mod tidy

builds:
  - id: contextd
    main: ./cmd/contextd
    binary: contextd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/abyssmemes/contextverse/internal/version.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  draft: false
  replace_existing_draft: true
  name_template: "v{{.Version}}"

nfpms:
  - id: linux-packages
    package_name: contextd
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Arch }}"
    homepage: https://github.com/abyssmemes/contextverse
    maintainer: abyssmemes
    description: Portable, vendor-neutral context for AI
    license: BUSL-1.1
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: deploy/contextd.service
        dst: /usr/lib/systemd/system/contextd.service
        type: config
      - src: deploy/contextd.plist
        dst: /usr/share/doc/contextd/contextd.plist
        type: config

# Scoop/Winget: manifests under packaging/ (see packaging/README.md).
# Auto-PR to microsoft/winget-pkgs and a scoop bucket can be wired when those repos exist.
